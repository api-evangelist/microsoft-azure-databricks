  /2.1/jobs/runs/cancel:
    post:
      operationId: cancelJobRun
      summary: Azure Databricks Cancel a Job Run
      description: Cancels a run. The run is canceled asynchronously, so when this request completes, the run may still be running. The run is terminated shortly after the cancellation request.
      tags:
      - Jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - run_id
              properties:
                run_id:
                  type: integer
                  format: int64
                  description: The ID of the run to cancel
            examples:
              CanceljobrunRequestExample:
                summary: Default cancelJobRun request
                x-microcks-default: true
                value:
                  run_id: '500123'
      responses:
        '200':
          description: Run cancellation initiated
          content:
            application/json:
              schema:
                type: object
              examples:
                Canceljobrun200Example:
                  summary: Default cancelJobRun 200 response
                  x-microcks-default: true
                  value: {}
        '400':
