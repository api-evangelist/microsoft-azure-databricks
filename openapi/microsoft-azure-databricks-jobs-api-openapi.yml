components:
  responses:
    BadRequest:
      description: The request is malformed or contains invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: The request has been rate-limited
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: The caller does not have permission to perform the operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: An internal server error occurred
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication credentials are missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    TaskSettings:
      type: object
      required:
      - task_key
      properties:
        task_key:
          type: string
          description: Unique key for the task within the job. Must be unique among all tasks in the same job.
          maxLength: 100
          example: example_value
        description:
          type: string
          description: Optional description for the task
          example: A sample description.
        depends_on:
          type: array
          items:
            type: object
            properties:
              task_key:
                type: string
                description: Key of the task this task depends on
              outcome:
                type: string
                description: Expected outcome of the dependency
          description: Tasks this task depends on. The task will not start until all dependent tasks complete successfully.
          example: []
        existing_cluster_id:
          type: string
          description: ID of an existing cluster to use for this task
          example: '500123'
        new_cluster:
          $ref: '#/components/schemas/CreateClusterRequest'
        job_cluster_key:
          type: string
          description: Key of a job cluster specification to use. Refers to a cluster defined in the job's job_clusters field.
          example: example_value
        notebook_task:
          type: object
          properties:
            notebook_path:
              type: string
              description: The path of the notebook to run in the Databricks workspace or remote repository
            base_parameters:
              type: object
              additionalProperties:
                type: string
              description: Base parameters for the notebook
            source:
              type: string
              enum:
              - WORKSPACE
              - GIT
              description: Location source of the notebook
          example: example_value
        spark_jar_task:
          type: object
          properties:
            main_class_name:
              type: string
              description: Full name of the main class to execute
            parameters:
              type: array
              items:
                type: string
              description: Parameters passed to the main method
            jar_uri:
              type: string
              description: Deprecated. URI of the JAR to execute.
              deprecated: true
          example: example_value
        spark_python_task:
          type: object
          properties:
            python_file:
              type: string
              description: URI of the Python file to execute
            parameters:
              type: array
              items:
                type: string
              description: Command line parameters for the Python file
            source:
              type: string
              enum:
              - WORKSPACE
              - GIT
          example: example_value
        spark_submit_task:
          type: object
          properties:
            parameters:
              type: array
              items:
                type: string
              description: Parameters for spark-submit
          example: example_value
        pipeline_task:
          type: object
          properties:
            pipeline_id:
              type: string
              description: ID of the Delta Live Tables pipeline
            full_refresh:
              type: boolean
              description: Whether to perform a full refresh
          example: example_value
        python_wheel_task:
          type: object
          properties:
            package_name:
              type: string
              description: Name of the Python wheel package
            entry_point:
              type: string
              description: Named entry point to use
            parameters:
              type: array
              items:
                type: string
            named_parameters:
              type: object
              additionalProperties:
                type: string
          example: example_value
        sql_task:
          type: object
          properties:
            warehouse_id:
              type: string
              description: ID of the SQL warehouse
            query:
              type: object
              properties:
                query_id:
                  type: string
            dashboard:
              type: object
              properties:
                dashboard_id:
                  type: string
            alert:
              type: object
              properties:
                alert_id:
                  type: string
            file:
              type: object
              properties:
                path:
                  type: string
                source:
                  type: string
                  enum:
                  - WORKSPACE
                  - GIT
          example: example_value
        dbt_task:
          type: object
          properties:
            commands:
              type: array
              items:
                type: string
              description: dbt commands to execute
            project_directory:
              type: string
              description: Path to the dbt project directory
            schema:
              type: string
              description: dbt schema name
            warehouse_id:
              type: string
              description: SQL warehouse ID for dbt
            profiles_directory:
              type: string
            catalog:
              type: string
            source:
              type: string
              enum:
              - WORKSPACE
              - GIT
          example: example_value
        run_if:
          type: string
          enum:
          - ALL_SUCCESS
          - AT_LEAST_ONE_SUCCESS
          - NONE_FAILED
          - ALL_DONE
          - AT_LEAST_ONE_FAILED
          - ALL_FAILED
          description: Condition for running this task based on dependencies
          example: ALL_SUCCESS
        timeout_seconds:
          type: integer
          format: int32
          description: Timeout in seconds for this individual task
          example: 10
        max_retries:
          type: integer
          format: int32
          description: Maximum number of retries for this task
          example: 10
        min_retry_interval_millis:
          type: integer
          format: int32
          description: Minimum interval between retries in milliseconds
          example: 10
        retry_on_timeout:
          type: boolean
          description: Whether to retry the task if it times out
          example: true
        libraries:
          type: array
          items:
            $ref: '#/components/schemas/Library'
          description: Libraries to install on the task cluster
          example: []
    ClusterLogConf:
      type: object
      description: Configuration for delivering Spark logs to a destination
      properties:
        dbfs:
          type: object
          properties:
            destination:
              type: string
              description: DBFS destination path for logs
          example: example_value
        s3:
          type: object
          properties:
            destination:
              type: string
            region:
              type: string
            endpoint:
              type: string
          example: example_value
    Job:
      type: object
      properties:
        job_id:
          type: integer
          format: int64
          description: Canonical identifier of the job
          example: '500123'
        creator_user_name:
          type: string
          description: Username of the job creator
          example: example_value
        run_as_user_name:
          type: string
          description: User the job runs as
          example: example_value
        settings:
          $ref: '#/components/schemas/JobSettings'
        created_time:
          type: integer
          format: int64
          description: Time the job was created (epoch milliseconds)
          example: 10
    RunState:
      type: object
      properties:
        life_cycle_state:
          type: string
          enum:
          - PENDING
          - QUEUED
          - RUNNING
          - TERMINATING
          - TERMINATED
          - SKIPPED
          - INTERNAL_ERROR
          - BLOCKED
          - WAITING_FOR_RETRY
          description: Life cycle state of the run
          example: PENDING
        result_state:
          type: string
          enum:
          - SUCCESS
          - FAILED
          - TIMEDOUT
          - CANCELED
          - MAXIMUM_CONCURRENT_RUNS_REACHED
          - EXCLUDED
          - SUCCESS_WITH_FAILURES
          - UPSTREAM_FAILED
          - UPSTREAM_CANCELED
          description: Result state of the run (available after completion)
          example: SUCCESS
        state_message:
          type: string
          description: Descriptive message for the current state
          example: example_value
        user_cancelled_or_timedout:
          type: boolean
          description: Whether the run was cancelled by a user or timed out
          example: true
    GitSource:
      type: object
      required:
      - git_url
      - git_provider
      properties:
        git_url:
          type: string
          description: URL of the Git repository
          example: https://www.example.com
        git_provider:
          type: string
          enum:
          - gitHub
          - bitbucketCloud
          - azureDevOpsServices
          - gitHubEnterprise
          - bitbucketServer
          - gitLab
          - gitLabEnterpriseEdition
          - awsCodeCommit
          description: Git provider type
          example: gitHub
        git_branch:
          type: string
          description: Branch to check out
          example: example_value
        git_tag:
          type: string
          description: Tag to check out
          example: example_value
        git_commit:
          type: string
          description: Commit hash to check out
          example: example_value
    AzureAttributes:
      type: object
      description: Attributes specific to Azure Databricks clusters
      properties:
        first_on_demand:
          type: integer
          format: int32
          description: The first nodes provisioned as on-demand instances. Remaining nodes will be spot instances.
          example: 10
        availability:
          type: string
          enum:
          - SPOT_AZURE
          - ON_DEMAND_AZURE
          - SPOT_WITH_FALLBACK_AZURE
          description: Azure availability type for cluster nodes
          example: SPOT_AZURE
        spot_bid_max_price:
          type: number
          format: double
          description: Max price for Azure spot instances. Set to -1 (default) to indicate that the instance should not be evicted based on price.
          example: 42.5
    Library:
      type: object
      properties:
        jar:
          type: string
          description: URI of the JAR library to install
          example: example_value
        egg:
          type: string
          description: URI of the egg library to install
          deprecated: true
          example: example_value
        whl:
          type: string
          description: URI of the wheel library to install
          example: example_value
        pypi:
          type: object
          properties:
            package:
              type: string
              description: Name of the PyPI package to install
            repo:
              type: string
              description: Repository URL to install the package from
          example: example_value
        maven:
          type: object
          properties:
            coordinates:
              type: string
              description: Maven coordinates (group:artifact:version)
            repo:
              type: string
              description: Maven repository URL
            exclusions:
              type: array
              items:
                type: string
              description: List of dependencies to exclude
          example: example_value
        cran:
          type: object
          properties:
            package:
              type: string
              description: Name of the CRAN package
            repo:
              type: string
              description: CRAN repository URL
          example: example_value
        requirements:
          type: string
          description: Path to a requirements.txt file. Only supported on clusters running Databricks Runtime 15.0+.
          example: example_value
    EmailNotifications:
      type: object
      properties:
        on_start:
          type: array
          items:
            type: string
          description: Email addresses to notify when a run starts
          example: []
        on_success:
          type: array
          items:
            type: string
          description: Email addresses to notify when a run succeeds
          example: []
        on_failure:
          type: array
          items:
            type: string
          description: Email addresses to notify when a run fails
          example: []
        on_duration_warning_threshold_exceeded:
          type: array
          items:
            type: string
          description: Email addresses to notify when a run exceeds the duration warning threshold
          example: []
        no_alert_for_skipped_runs:
          type: boolean
          description: Do not send alert for skipped runs
          example: true
    InitScriptInfo:
      type: object
      description: Configuration for a cluster init script
      properties:
        workspace:
          type: object
          properties:
            destination:
              type: string
              description: Workspace path for the init script
          example: example_value
        volumes:
          type: object
          properties:
            destination:
              type: string
              description: Unity Catalog Volumes path for the init script
          example: example_value
        dbfs:
          type: object
          properties:
            destination:
              type: string
              description: DBFS path for the init script
          deprecated: true
          example: example_value
        abfss:
          type: object
          properties:
            destination:
              type: string
              description: Azure Blob Storage (ABFSS) path for the init script
          example: example_value
    AutoScale:
      type: object
      properties:
        min_workers:
          type: integer
          format: int32
          description: Minimum number of workers
          example: 10
        max_workers:
          type: integer
          format: int32
          description: Maximum number of workers
          example: 10
      required:
      - min_workers
      - max_workers
    JobCluster:
      type: object
      required:
      - job_cluster_key
      - new_cluster
      properties:
        job_cluster_key:
          type: string
          description: Unique key identifying this cluster specification
          example: example_value
        new_cluster:
          $ref: '#/components/schemas/CreateClusterRequest'
    WebhookNotifications:
      type: object
      properties:
        on_start:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: ID of the system notification destination
          example: []
        on_success:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
          example: []
        on_failure:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
          example: []
        on_duration_warning_threshold_exceeded:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
          example: []
    CronSchedule:
      type: object
      properties:
        quartz_cron_expression:
          type: string
          description: Quartz cron expression for the schedule. See http://www.quartz-scheduler.org/documentation/quartz-2.3.0/tutorials/crontrigger.html
          examples:
          - 0 0 8 * * ?
        timezone_id:
          type: string
          description: Java timezone ID for the schedule
          examples:
          - America/Los_Angeles
        pause_status:
          type: string
          enum:
          - PAUSED
          - UNPAUSED
          description: Whether the schedule is paused or active
          example: PAUSED
    Run:
      type: object
      properties:
        run_id:
          type: integer
          format: int64
          description: Canonical identifier of the run
          example: '500123'
        job_id:
          type: integer
          format: int64
          description: ID of the job this run belongs to
          example: '500123'
        run_name:
          type: string
          description: Name of the run
          example: example_value
        creator_user_name:
          type: string
          description: Username of the user who triggered the run
          example: example_value
        number_in_job:
          type: integer
          format: int64
          description: Sequence number of this run among all runs of the job
          example: 10
        state:
          $ref: '#/components/schemas/RunState'
        tasks:
          type: array
          items:
            type: object
            properties:
              run_id:
                type: integer
                format: int64
              task_key:
                type: string
              state:
                $ref: '#/components/schemas/RunState'
              start_time:
                type: integer
                format: int64
              setup_duration:
                type: integer
                format: int64
              execution_duration:
                type: integer
                format: int64
              cleanup_duration:
                type: integer
                format: int64
              end_time:
                type: integer
                format: int64
              attempt_number:
                type: integer
                format: int32
          example: []
        schedule:
          $ref: '#/components/schemas/CronSchedule'
        cluster_spec:
          type: object
          properties:
            existing_cluster_id:
              type: string
            new_cluster:
              $ref: '#/components/schemas/CreateClusterRequest'
          example: example_value
        cluster_instance:
          type: object
          properties:
            cluster_id:
              type: string
            spark_context_id:
              type: string
          example: example_value
        start_time:
          type: integer
          format: int64
          description: Start time of the run (epoch milliseconds)
          example: 10
        setup_duration:
          type: integer
          format: int64
          description: Time spent setting up the cluster in milliseconds
          example: 10
        execution_duration:
          type: integer
          format: int64
          description: Time spent executing the run in milliseconds
          example: 10
        cleanup_duration:
          type: integer
          format: int64
          description: Time spent cleaning up after the run in milliseconds
          example: 10
        end_time:
          type: integer
          format: int64
          description: End time of the run (epoch milliseconds)
          example: 10
        trigger:
          type: string
          enum:
          - PERIODIC
          - ONE_TIME
          - RETRY
          - RUN_JOB_TASK
          - FILE_ARRIVAL
          description: What triggered this run
          example: PERIODIC
        run_type:
          type: string
          enum:
          - JOB_RUN
          - WORKFLOW_RUN
          - SUBMIT_RUN
          example: JOB_RUN
        attempt_number:
          type: integer
          format: int32
          description: Current attempt number of the run
          example: 10
        run_page_url:
          type: string
          description: URL of the run page in the Databricks UI
          example: https://www.example.com
        format:
          type: string
          enum:
          - SINGLE_TASK
          - MULTI_TASK
          example: SINGLE_TASK
    Error:
      type: object
      properties:
        error_code:
          type: string
          description: Databricks error code (e.g., RESOURCE_DOES_NOT_EXIST, INVALID_PARAMETER_VALUE)
          example: example_value
        message:
          type: string
          description: Human-readable error message
          example: example_value
      required:
      - error_code
      - message
    CreateClusterRequest:
      type: object
      required:
      - spark_version
      properties:
        cluster_name:
          type: string
          description: Cluster name requested by the user. Does not have to be unique. If not specified at creation, the cluster name is an empty string.
          example: example_value
        spark_version:
          type: string
          description: The runtime version of the cluster. You can retrieve a list of available runtime versions using the spark-versions endpoint.
          examples:
          - 13.3.x-scala2.12
        node_type_id:
          type: string
          description: The node type for the worker nodes. Refer to list-node-types for available node types.
          examples:
          - Standard_DS3_v2
        driver_node_type_id:
          type: string
          description: The node type for the driver node. If unset, the driver node type is set as the same value as node_type_id.
          example: '500123'
        num_workers:
          type: integer
          format: int32
          description: Number of worker nodes. For a fixed-size cluster, set this to the desired number of workers. For an autoscaling cluster, this field is ignored in favor of autoscale settings.
          example: 10
        autoscale:
          $ref: '#/components/schemas/AutoScale'
        spark_conf:
          type: object
          additionalProperties:
            type: string
          description: Map of Spark configuration key-value pairs. These are passed directly to the Spark driver and executors.
          example: example_value
        azure_attributes:
          $ref: '#/components/schemas/AzureAttributes'
        ssh_public_keys:
          type: array
          items:
            type: string
          description: SSH public keys for accessing cluster nodes
          example: []
        custom_tags:
          type: object
          additionalProperties:
            type: string
          description: Custom tags applied to cluster resources. Databricks adds default tags in addition to any custom tags you specify.
          example: example_value
        cluster_log_conf:
          $ref: '#/components/schemas/ClusterLogConf'
        init_scripts:
          type: array
          items:
            $ref: '#/components/schemas/InitScriptInfo'
          description: Init scripts to run when the cluster starts
          example: []
        spark_env_vars:
          type: object
          additionalProperties:
            type: string
          description: Map of environment variable key-value pairs for the Spark process.
          example: example_value
        enable_elastic_disk:
          type: boolean
          description: If true, enable autoscaling local storage. When enabled, the amount of disk space used by the cluster auto-adjusts.
          example: true
        instance_pool_id:
          type: string
          description: ID of the instance pool to use for cluster nodes. If specified, the cluster uses the instance pool for both driver and worker nodes.
          example: '500123'
        policy_id:
          type: string
          description: Identifier of the cluster policy used to create the cluster.
          example: '500123'
        enable_local_disk_encryption:
          type: boolean
          description: Whether to enable local disk encryption for the cluster
          example: true
        runtime_engine:
          type: string
          enum:
          - STANDARD
          - PHOTON
          description: The runtime engine to use. PHOTON provides optimized query execution.
          example: STANDARD
        data_security_mode:
          type: string
          enum:
          - NONE
          - SINGLE_USER
          - USER_ISOLATION
          - LEGACY_TABLE_ACL
          - LEGACY_PASSTHROUGH
          - LEGACY_SINGLE_USER
          - LEGACY_SINGLE_USER_STANDARD
          description: Data security mode for the cluster. Determines how data access is controlled.
          example: NONE
        single_user_name:
          type: string
          description: The name of the single user who can execute commands on the cluster. Required when data_security_mode is SINGLE_USER.
          example: example_value
    JobSettings:
      type: object
      properties:
        name:
          type: string
          description: Optional name for the job. Default is Untitled.
          default: Untitled
          example: Example Title
        tags:
          type: object
          additionalProperties:
            type: string
          description: Map of tags associated with the job
          example: example_value
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskSettings'
          description: List of task specifications for the job. A job must contain at least one task.
          example: []
        job_clusters:
          type: array
          items:
            $ref: '#/components/schemas/JobCluster'
          description: A list of job cluster specifications that can be shared and reused by tasks.
          example: []
        email_notifications:
          $ref: '#/components/schemas/EmailNotifications'
        webhook_notifications:
          $ref: '#/components/schemas/WebhookNotifications'
        notification_settings:
          type: object
          properties:
            no_alert_for_skipped_runs:
              type: boolean
              description: Do not send alert for skipped runs
            no_alert_for_canceled_runs:
              type: boolean
              description: Do not send alert for canceled runs
          example: example_value
        timeout_seconds:
          type: integer
          format: int32
          description: Timeout in seconds applied to each run of this job. Default is no timeout.
          default: 0
          example: 10
        max_concurrent_runs:
          type: integer
          format: int32
          description: Maximum allowed number of concurrent runs of the job. Default is 1.
          default: 1
          example: 10
        schedule:
          $ref: '#/components/schemas/CronSchedule'
        trigger:
          type: object
          properties:
            file_arrival:
              type: object
              properties:
                url:
                  type: string
                  description: URL of the storage location to monitor
                min_time_between_triggers_seconds:
                  type: integer
                  format: int32
                wait_after_last_change_seconds:
                  type: integer
                  format: int32
          description: Trigger settings for file arrival events
          example: example_value
        continuous:
          type: object
          properties:
            pause_status:
              type: string
              enum:
              - PAUSED
              - UNPAUSED
          description: Settings for continuous job execution
          example: example_value
        git_source:
          $ref: '#/components/schemas/GitSource'
        format:
          type: string
          enum:
          - SINGLE_TASK
          - MULTI_TASK
          description: Format of the job. MULTI_TASK is the preferred format for creating jobs with multiple tasks.
          example: SINGLE_TASK
        queue:
          type: object
          properties:
            enabled:
              type: boolean
              description: Whether to queue the run if the cluster is not available
          example: example_value
        parameters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              default:
                type: string
          description: Job-level parameters
          example: []
        run_as:
          type: object
          properties:
            user_name:
              type: string
            service_principal_name:
              type: string
          description: User or service principal to run the job as
          example: example_value
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Databricks personal access token. Pass the token in the Authorization header as Bearer <token>.
    AzureADToken:
      type: oauth2
      description: Azure Active Directory token for authenticating with Azure Databricks. Supports both user and service principal authentication.
      flows:
        authorizationCode:
          authorizationUrl: https://login.microsoftonline.com/{tenant_id}/oauth2/v2.0/authorize
          tokenUrl: https://login.microsoftonline.com/{tenant_id}/oauth2/v2.0/token
          scopes:
            2ff814a6-3304-4ab8-85cb-cd0e6f879c1d/.default: Access Azure Databricks workspace resources
