specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Azure Databricks
providerId: microsoft-azure-databricks
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Analytics
  - Apache Spark
  - Lakehouse
  - Microsoft Azure
description: Azure Databricks is priced per Databricks Unit (DBU) consumed plus the underlying Azure
  VM and storage cost. DBU rates differ by workload type (Jobs, All-Purpose, SQL, Model Serving) and
  workspace tier. The Standard workspace tier is being retired October 1, 2026; new Standard workspaces
  ended April 1, 2026 and existing workspaces auto-upgrade to Premium. DBCU pre-purchase commitments
  yield up to 37% savings.
sources:
  - https://azure.microsoft.com/en-us/pricing/details/databricks/
plans:
  - id: microsoft-azure-databricks-jobs-compute
    name: Jobs Compute (Premium)
    type: usage-based
    description: Automated, ephemeral clusters for scheduled and triggered jobs. Cheapest DBU rate.
    entries:
      - label: Jobs Compute DBU
        name: jobs_dbu
        type: metered
        metric: DBU
        limit: -1
        timeFrame: hour
        geo: per-region
        unit: 1
        price: '~$0.15 per DBU (Premium)'
        userMultiplied: false
    elements:
      - name: Ephemeral clusters
      - name: Cheapest DBU rate
      - name: Recommended for production batch
  - id: microsoft-azure-databricks-all-purpose
    name: All-Purpose Compute (Premium)
    type: usage-based
    description: Interactive analytics clusters for notebooks and ad-hoc work.
    entries:
      - label: All-Purpose DBU (Premium)
        name: all_purpose_dbu
        type: metered
        metric: DBU
        limit: -1
        timeFrame: hour
        geo: per-region
        unit: 1
        price: '~$0.55 per DBU (Premium)'
        userMultiplied: false
    elements:
      - name: Interactive notebooks
      - name: Auto-termination
      - name: Premium-only after Oct 1, 2026
  - id: microsoft-azure-databricks-all-purpose-standard
    name: All-Purpose Compute (Standard - retiring)
    type: usage-based
    description: Standard tier All-Purpose DBU rate. Standard tier retires October 1, 2026; new Standard
      workspaces ended April 1, 2026. Existing workspaces will auto-upgrade to Premium.
    entries:
      - label: All-Purpose DBU (Standard)
        name: all_purpose_dbu_standard
        type: metered
        metric: DBU
        limit: -1
        timeFrame: hour
        geo: per-region
        unit: 1
        price: '~$0.40 per DBU (Standard, retiring)'
        userMultiplied: false
    elements:
      - name: Retiring October 1, 2026
      - name: ~35%+ cost increase on auto-upgrade to Premium
  - id: microsoft-azure-databricks-sql-serverless
    name: Databricks SQL Serverless (Premium)
    type: usage-based
    description: Serverless SQL warehouses for BI and ad-hoc SQL. Highest DBU rate; VM cost included.
    entries:
      - label: SQL Serverless DBU
        name: sql_serverless_dbu
        type: metered
        metric: DBU
        limit: -1
        timeFrame: hour
        geo: per-region
        unit: 1
        price: '~$0.70 per DBU (VM cost included)'
        userMultiplied: false
    elements:
      - name: Serverless SQL warehouses
      - name: VM cost included in DBU
      - name: Sub-second startup
  - id: microsoft-azure-databricks-model-serving
    name: Model Serving
    type: usage-based
    description: Real-time model serving endpoints metered in DBUs.
    entries:
      - label: Model Serving DBU
        name: model_serving_dbu
        type: metered
        metric: DBU
        limit: -1
        timeFrame: hour
        geo: per-region
        unit: 1
        price: 'see Azure pricing page (Model Serving DBU)'
        userMultiplied: false
    elements:
      - name: Real-time inference
      - name: Auto-scale endpoints
  - id: microsoft-azure-databricks-dbcu-commit
    name: DBCU Pre-Purchase
    type: enterprise
    description: 1- or 3-year pre-purchased Databricks Commit Units (DBCUs) for up to 37% savings
      vs pay-as-you-go DBU rates.
    entries:
      - label: 1-year DBCU
        name: dbcu_1y
        type: subscription
        metric: DBCU
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: 'see Azure pricing page (up to ~24% off pay-as-you-go)'
        userMultiplied: false
      - label: 3-year DBCU
        name: dbcu_3y
        type: subscription
        metric: DBCU
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: 'see Azure pricing page (up to ~37% off pay-as-you-go)'
        userMultiplied: false
    elements:
      - name: 1- or 3-year terms
      - name: Up to 37% savings
      - name: Applies across DBU types
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
