specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Azure Databricks
providerId: microsoft-azure-databricks
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Analytics
  - Microsoft Azure
description: 'FOCUS-aligned FinOps for Azure Databricks: per-DBU consumption metered by workload type
  (Jobs, All-Purpose, SQL Serverless, Model Serving) on top of Azure VM and storage cost, with optional
  1- or 3-year DBCU pre-purchase commitments.'
sources:
  - https://azure.microsoft.com/en-us/pricing/details/databricks/
  - https://learn.microsoft.com/en-us/azure/databricks/admin/account-settings/usage
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Microsoft Corporation
serviceCategory: Analytics / Data + AI Platform
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Azure Databricks
  ServiceCategory: Analytics
  ProviderName: Microsoft
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: jobs_dbu
    unit: DBU
    aggregation: sum
    dimensions:
      - workspace
      - cluster
      - sku
      - region
  - name: all_purpose_dbu
    unit: DBU
    aggregation: sum
    dimensions:
      - workspace
      - cluster
      - sku
      - region
  - name: sql_serverless_dbu
    unit: DBU
    aggregation: sum
    dimensions:
      - workspace
      - warehouse
      - region
  - name: model_serving_dbu
    unit: DBU
    aggregation: sum
    dimensions:
      - workspace
      - endpoint
  - name: vm_compute_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - workspace
      - vm_sku
      - region
  - name: managed_storage
    unit: GB-month
    aggregation: avg
    dimensions:
      - workspace
principles:
  - name: Visibility
    description: Use the Databricks Usage UI / system tables (system.billing.usage) and Azure Cost
      Management to correlate DBUs with VM and storage line items per workspace and cluster.
  - name: Allocation
    description: Tag clusters and SQL warehouses with cost-center and project tags that propagate
      to billing usage records; use Unity Catalog for per-team workspace and catalog scoping.
  - name: Optimization
    description: Move scheduled work from All-Purpose to Jobs Compute; right-size cluster autoscaling;
      use Photon and serverless where break-even; pre-purchase DBCUs for steady baseline; auto-terminate
      idle clusters.
  - name: Accountability
    description: Assign workspace owners as cost owners; alert on DBU burn rate vs commitment; review
      Standard-to-Premium migration timing before October 1, 2026 retirement.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
