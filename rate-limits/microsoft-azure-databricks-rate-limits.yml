specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Azure Databricks
providerId: microsoft-azure-databricks
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Analytics
  - Microsoft Azure
description: Azure Databricks REST APIs apply per-workspace and per-API rate limits. Most APIs target
  a few hundred requests per second per workspace; Jobs API and Files API have lower per-second targets.
  Some APIs (Statement Execution, Model Serving) use endpoint-specific limits. SCIM and account-level
  APIs are throttled separately.
sources:
  - https://learn.microsoft.com/en-us/azure/databricks/resources/limits
  - https://docs.databricks.com/api/workspace/jobs
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Workspace API requests
    scope: workspace
    metric: requests_per_second
    limit: 'see Databricks limits page (typical hundreds RPS per workspace)'
  - name: Jobs API runs
    scope: workspace
    metric: concurrent_runs
    limit: 'workspace-configurable max concurrent runs'
  - name: Statement Execution API
    scope: workspace
    metric: concurrent_statements
    limit: 'see Statement Execution API limits'
  - name: Model Serving endpoint QPS
    scope: endpoint
    metric: queries_per_second
    limit: 'configurable per endpoint with concurrency budget'
  - name: SCIM (account)
    scope: account
    metric: requests_per_second
    limit: 'see SCIM provisioning limits'
policies:
  - name: Honor Retry-After
    description: When the API returns 429, wait the duration specified in Retry-After before retrying.
  - name: Backoff with jitter
    description: Apply exponential backoff with jitter to avoid thundering herds against the workspace
      control plane.
  - name: Bulk endpoints over loops
    description: Prefer batch endpoints (e.g. Jobs runs list with filters) and Delta Live Tables
      over polling individual resources.
  - name: Workspace partitioning
    description: Heavy multi-tenant workloads should be partitioned across multiple workspaces to
      avoid control-plane throttling.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
