naftiko: "1.0.0-alpha1"

info:
  label: "Azure Databricks"
  description: "Azure Databricks REST API for managing clusters, jobs, and workspace objects."
  tags:
    - Azure
    - Databricks
    - Apache Spark
    - Big Data
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      DATABRICKS_TOKEN: DATABRICKS_TOKEN
      DATABRICKS_HOST: DATABRICKS_HOST

capability:
  consumes:
    - type: http
      namespace: databricks
      baseUri: https://{databricks_instance}.azuredatabricks.net/api
      description: "Azure Databricks REST API"
      authentication:
        type: bearer
        token: "{{DATABRICKS_TOKEN}}"
      resources:
        - name: clusters
          path: /2.0/clusters
          description: "Manage Databricks clusters"
          operations:
            - name: create-cluster
              method: POST
              description: "Create a new cluster"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster_name: "{{tools.cluster_name}}"
                  spark_version: "{{tools.spark_version}}"
                  node_type_id: "{{tools.node_type_id}}"
                  num_workers: "{{tools.num_workers}}"
            - name: list-clusters
              method: GET
              description: "List all clusters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-cluster
              method: GET
              description: "Get cluster details"
              inputParameters:
                - name: cluster_id
                  in: query
                  type: string
                  required: true
                  description: "The cluster ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: edit-cluster
              method: POST
              description: "Edit cluster configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: start-cluster
              method: POST
              description: "Start a terminated cluster"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster_id: "{{tools.cluster_id}}"
            - name: restart-cluster
              method: POST
              description: "Restart a cluster"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster_id: "{{tools.cluster_id}}"
            - name: terminate-cluster
              method: POST
              description: "Terminate a running cluster"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster_id: "{{tools.cluster_id}}"
            - name: delete-cluster
              method: POST
              description: "Permanently delete a cluster"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster_id: "{{tools.cluster_id}}"
            - name: pin-cluster
              method: POST
              description: "Pin a cluster to prevent auto-termination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: unpin-cluster
              method: POST
              description: "Unpin a cluster"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-cluster-events
              method: POST
              description: "List cluster events"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-spark-versions
              method: GET
              description: "List available Spark versions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-node-types
              method: GET
              description: "List available node types"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: jobs
          path: /2.1/jobs
          description: "Manage Databricks jobs"
          operations:
            - name: create-job
              method: POST
              description: "Create a new job"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-jobs
              method: GET
              description: "List all jobs"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-job
              method: GET
              description: "Get job details"
              inputParameters:
                - name: job_id
                  in: query
                  type: integer
                  required: true
                  description: "The job ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-job
              method: POST
              description: "Partially update job settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: reset-job
              method: POST
              description: "Overwrite all job settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-job
              method: POST
              description: "Delete a job"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: run-job-now
              method: POST
              description: "Trigger a one-time job run"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-job-runs
              method: GET
              description: "List job runs"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-job-run
              method: GET
              description: "Get run details"
              inputParameters:
                - name: run_id
                  in: query
                  type: integer
                  required: true
                  description: "The run ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-job-run
              method: POST
              description: "Cancel a running job"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-job-run-output
              method: GET
              description: "Get job run output"
              inputParameters:
                - name: run_id
                  in: query
                  type: integer
                  required: true
                  description: "The run ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: workspace
          path: /2.0/workspace
          description: "Manage workspace objects"
          operations:
            - name: list-workspace-objects
              method: GET
              description: "List workspace objects in a directory"
              inputParameters:
                - name: path
                  in: query
                  type: string
                  required: true
                  description: "The workspace path"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-workspace-object-status
              method: GET
              description: "Get workspace object status"
              inputParameters:
                - name: path
                  in: query
                  type: string
                  required: true
                  description: "The workspace path"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-workspace-directory
              method: POST
              description: "Create a workspace directory"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-workspace-object
              method: POST
              description: "Delete a workspace object"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: import-workspace-object
              method: POST
              description: "Import a notebook or file"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: export-workspace-object
              method: GET
              description: "Export a notebook or file"
              inputParameters:
                - name: path
                  in: query
                  type: string
                  required: true
                  description: "The workspace path"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: databricks-api
      resources: []

    - type: mcp
      port: 9100
      namespace: databricks-mcp
      transport: http
      tools: []
